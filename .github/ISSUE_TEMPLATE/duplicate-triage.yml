name: Duplicate triage
description: Сравнить конкурирующие upstream PR.
title: "[duplicate-triage] "
labels: ["duplicate-triage"]
body:
  - type: textarea
    id: prs
    attributes:
      label: PR для сравнения
      description: Номера, ссылки, авторы, createdAt, state.
    validations:
      required: true
  - type: textarea
    id: diff
    attributes:
      label: Diff coverage
      description: Файлы, runtime paths и поведение каждого PR.
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Test coverage
      description: Regression tests, fixtures, validation commands, CI state.
    validations:
      required: true
  - type: textarea
    id: maintainer
    attributes:
      label: Maintainer signal
      description: Labels, comments, reviews, timeline, linked issues, reactions.
    validations:
      required: true
  - type: textarea
    id: decision
    attributes:
      label: Решение
      description: "Что делаем: портируем, спрашиваем maintainers или пишем duplicate-check update."
    validations:
      required: true
