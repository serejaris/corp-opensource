name: Баг-кандидат
description: Оценить возможный upstream bugfix contribution.
title: "[candidate-bug] "
labels: ["candidate-bug"]
body:
  - type: input
    id: repo
    attributes:
      label: Репозиторий
      description: OWNER/REPO и ссылка.
    validations:
      required: true
  - type: textarea
    id: signal
    attributes:
      label: Сигнал бага
      description: Issues, PRs, реакции, дубликаты, логи, release regression или личный repro.
    validations:
      required: true
  - type: textarea
    id: fit
    attributes:
      label: Подходит ли репозиторий
      description: Активность, contribution rules, tests, maintainer response.
    validations:
      required: true
  - type: textarea
    id: patch
    attributes:
      label: Patch surface
      description: Вероятные файлы, тесты и validation command.
    validations:
      required: true
  - type: textarea
    id: next
    attributes:
      label: Следующее действие
      description: Точная команда, repro или subagent research task.
    validations:
      required: true

