name: Upstream-наблюдение
description: Следить за внешним open-source PR, issue или release follow-up.
title: "[upstream-watch] "
labels: ["upstream-watch"]
body:
  - type: input
    id: upstream
    attributes:
      label: Upstream-ссылка
      description: PR, issue, release или commit URL.
    validations:
      required: true
  - type: textarea
    id: status
    attributes:
      label: Текущий статус
      description: Что сейчас правда; если важно, с датами.
    validations:
      required: true
  - type: textarea
    id: watch
    attributes:
      label: За чем следить
      description: Comments, reviews, CI, release tags, duplicate PRs, linked issues.
    validations:
      required: true
  - type: textarea
    id: next
    attributes:
      label: Следующее действие
      description: Точная следующая проверка или действие.
    validations:
      required: true

